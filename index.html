<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6C63FF" />
  <title>투두리</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>투두리 <span class="sub">조이의 스케줄 매니저</span></h1>
    <button id="login-btn" class="btn-login">Google 캘린더 연결</button>
  </header>

  <nav class="tab-bar">
    <button class="tab active" data-tab="today">오늘</button>
    <button class="tab" data-tab="schedule">일정</button>
    <button class="tab" data-tab="tasks">할 일</button>
  </nav>

  <main>
    <!-- 오늘 탭 -->
    <section id="tab-today" class="tab-content active">
      <div class="date-chip" id="today-date"></div>

      <div class="card urgent">
        <div class="card-label">⚠️ 마감 임박</div>
        <div class="card-title">트랙별 소개 자료 제출</div>
        <div class="card-meta" id="dday-display"></div>
      </div>

      <div class="section-title">오늘의 할 일</div>
      <div id="today-tasks" class="task-list"></div>

      <div class="section-title">이번 주 캘린더</div>
      <div id="week-events" class="event-list">
        <div class="loading">Google 캘린더 연결 후 표시됩니다</div>
      </div>
    </section>

    <!-- 일정 탭 -->
    <section id="tab-schedule" class="tab-content">
      <div class="section-title">2학기 주요 일정</div>
      <div class="timeline" id="semester-timeline"></div>

      <div class="section-title">Google 캘린더 일정</div>
      <div id="calendar-events" class="event-list">
        <div class="loading">Google 캘린더 연결 후 표시됩니다</div>
      </div>
    </section>

    <!-- 할 일 탭 -->
    <section id="tab-tasks" class="tab-content">
      <div class="progress-bar-wrap">
        <div class="progress-label">트랙 소개 자료 진행률 <span id="progress-pct">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>

      <div id="phase-list"></div>

      <button class="fab" id="add-task-btn">+ 할 일 추가</button>
    </section>
  </main>

  <!-- 일정 추가/수정 모달 -->
  <div id="event-modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modal-title">일정 추가</h2>
      <input type="text" id="event-title-input" placeholder="제목" />
      <input type="datetime-local" id="event-start-input" />
      <input type="datetime-local" id="event-end-input" />
      <textarea id="event-desc-input" placeholder="메모 (선택)"></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">취소</button>
        <button class="btn-save" id="modal-save">저장</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
